services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: mediapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./pgdata:/var/lib/mediapi/data  #полный путь к корневому каталогу базы данных", на полный путь к корневому каталогу базы данных. Каталог создавать не надо, система создаст его при запуске.

  api:
    image: ghcr.io/sw-consulting/media-pi.core:latest
    ports:
      - "8084:8080"
      - "8085:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "https://+:8081;http://+:8080"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/certificate/s.pfx"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "<password>"       #пароль к PKCS #12
    volumes:
      - R:/Projects/certificate:/certificate:ro               #полный путь к каталогу с сертификатами сайта", на полный путь к каталогу с сертификатами сайта 

  ui:
    image: ghcr.io/sw-consulting/media-pi.ui:latest
    ports:
      - "8082:8082"
      - "8083:8083"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - R:/Projects/certificate:/etc/nginx/certificate:ro      #полный путь к каталогу с сертификатами сайта", на полный путь к каталогу с сертификатами сайта
    environment:
      API_URL: https://localhost:8085/api

  backup:
    image: ghcr.io/sw-consulting/db-backup:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mediapi
      DB_USER: postgres
      DB_PASSWORD: postgres
      BACKUP_DIR: /backups
      RETENTION_DAYS: 7
    volumes:
      - ./backup/data:/backups      #полный путь к каталогу резервной копии базы данных", на полный путь к каталогу резервной копии базы данных. Каталог создавать не надо, система создаст его при запуске.
      - ./backup/logs:/var/log      #полный путь к каталогу журналов резервного копирования", на полный путь к каталогу журналов резервного копирования. Каталог создавать не надо, система создаст его при запуске. 
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 1h
      timeout: 30s
      retries: 3
      start_period: 5s
    restart: always
    init: true
