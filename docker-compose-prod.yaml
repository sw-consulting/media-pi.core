services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=sterlev_alex@mail.ru"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=300s"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=300s"
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=300s"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=300s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=300s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=300s"
      - "--serversTransport.forwardingTimeouts.dialTimeout=30s"
      - "--serversTransport.forwardingTimeouts.responseHeaderTimeout=300s"
      - "--serversTransport.forwardingTimeouts.idleConnTimeout=300s"      
    ports:
      - "80:80"
      - "443:443"
     # - "8080:8080" # dashboard Traefik
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: always

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: mediapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
#    ports:
#      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - /var/media-pi/data:/var/lib/postgresql/data # ïîëíûé ïóòü ê êîðíåâîìó êàòàëîãó ÁÄ
    restart: always

  api:
    image: ghcr.io/sw-consulting/media-pi.core:latest
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.api.rule=Host(`vezyn.fvds.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"

      - "traefik.http.services.api.loadbalancer.server.port=8080"
   # ports:
     # - "127.0.0.1:8085:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
     # ASPNETCORE_Kestrel__Certificates__Default__Path: "/certificate/s.pfx"
     # ASPNETCORE_Kestrel__Certificates__Default__Password: "PracticallyImpossible"
    volumes:
      - /var/media-pi/storage:/var/lib/storage:rw
      - /etc/media-pi/certificates:/certificate:ro
    restart: always

  ui:
    image: ghcr.io/sw-consulting/media-pi.ui:latest
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.ui.rule=Host(`vezyn.fvds.ru`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls.certresolver=myresolver"

      - "traefik.http.services.ui.loadbalancer.server.port=8083"
   # ports:
     # - "127.0.0.1:8083:8082"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      API_URL: https://vezyn.fvds.ru/api
    restart: always

  backup:
    image: ghcr.io/sw-consulting/db-backup:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mediapi
      DB_USER: postgres
      DB_PASSWORD: postgres
      BACKUP_DIR: /backups
      RETENTION_DAYS: 7
    volumes:
      - /var/media-pi/backup/data:/backups
      - /var/media-pi/logs:/var/log
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 1h
      timeout: 30s
      retries: 3
      start_period: 5s
    restart: always
    init: true
